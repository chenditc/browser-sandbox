worker_processes 1;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 200m;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /dev/stdout;
    error_log  /dev/stderr;

    gzip on;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    map $scheme $ws_scheme {
        https wss;
        default ws;
    }

    server {
        listen 8080 default_server;

        # ---- default landing ----
        location = / {
            return 302 $scheme://$http_host/readme;
        }

        location = /readme {
            default_type text/html;
            alias /usr/share/nginx/html/readme.html;
        }

        # ---- health check ----
        location = /v1/ping {
            default_type 'text/plain; charset=utf-8';
            return 200 "pong";
        }

        # ---- CDP: JSON HTTP endpoints ----
        # Chrome returns ws://127.0.0.1:9222/... in its JSON responses.
        # We rewrite those to point at the caller's host so remote clients
        # can connect through this nginx proxy.
        location /json {
            set $original_host $http_host;

            proxy_pass http://127.0.0.1:9222;
            proxy_http_version 1.1;
            proxy_set_header Host "127.0.0.1:9222";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            sub_filter_types application/json;
            sub_filter_once off;
            sub_filter 'ws://127.0.0.1:9222' '$ws_scheme://$original_host';
            sub_filter 'ws=127.0.0.1:9222' '$ws_scheme=$original_host';
        }

        # ---- CDP: DevTools WebSocket ----
        location /devtools/ {
            proxy_pass http://127.0.0.1:9222;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 1800s;
            proxy_send_timeout 1800s;
        }

        # ---- VNC: noVNC static files ----
        location /vnc/ {
            alias /opt/novnc/;
            index index.html vnc.html;
        }

        # ---- VNC: WebSocket bridge ----
        location /ws {
            proxy_pass http://127.0.0.1:6080/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /websockify {
            proxy_pass http://127.0.0.1:6080/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
